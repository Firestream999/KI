<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Chatbot – Fragen zu allen Themen</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --accent-color: #4fc3f7;
            --background-color: #f8f9fa;
            --chat-background: #ffffff;
            --user-bubble: #4fc3f7;
            --bot-bubble: #e5e5ea;
            --text-color: #333;
            --light-text: #666;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--white);
            text-align: center;
            padding: 1.5rem 1rem;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
            width: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: var(--chat-background);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message-user {
            align-items: flex-end;
        }

        .message-bot {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: var(--border-radius);
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-bubble {
            background: var(--user-bubble);
            color: var(--white);
            border-bottom-right-radius: 0;
        }

        .bot-bubble {
            background: var(--bot-bubble);
            color: var(--text-color);
            border-bottom-left-radius: 0;
        }

        .message-sender {
            font-size: 0.8rem;
            color: var(--light-text);
            padding: 0 0.5rem;
        }

        .chat-input-container {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: var(--chat-background);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .chat-input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 1rem;
            outline: none;
            transition: border 0.3s ease;
        }

        .chat-input:focus {
            border-color: var(--accent-color);
        }

        .send-button {
            padding: 0.8rem 1.5rem;
            background: var(--accent-color);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .send-button:hover {
            background: #3ba8e6;
        }

        .send-button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bot-bubble);
            border-radius: var(--border-radius);
            border-bottom-left-radius: 0;
            max-width: 80%;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--light-text);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-5px);
            }
        }

        .welcome-message {
            text-align: center;
            padding: 1rem;
            color: var(--light-text);
            font-size: 0.9rem;
        }

        footer {
            background: var(--secondary-color);
            color: var(--white);
            text-align: center;
            padding: 1rem;
            margin-top: auto;
        }

        footer p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.5rem;
            }

            .chat-container {
                padding: 0.5rem;
            }

            .chat-messages {
                padding: 0.5rem;
            }

            .message-bubble {
                max-width: 90%;
            }

            .chat-input-container {
                padding: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.3rem;
            }

            header p {
                font-size: 0.9rem;
            }

            .chat-input {
                font-size: 0.9rem;
            }

            .send-button {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>KI-Chatbot</h1>
        <p>Fragen zu allen Themen – Technologie, Wissenschaft, Kultur und mehr</p>
    </header>

    <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <p>👋 Willkommen! Stelle mir eine Frage zu einem beliebigen Thema.</p>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="userInput" 
                placeholder="Schreibe eine Nachricht..." 
                autocomplete="off"
            >
            <button class="send-button" id="sendButton">Senden</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 KI-Chatbot – Künstliche Intelligenz für alle Themen</p>
    </footer>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');

        // Backend-URL (für GitHub Pages muss das Backend auf einem Server laufen)
        const backendUrl = "http://localhost:3000/chat"; // Ändere dies zu deiner Backend-URL

        // Funktion zum Hinzufügen einer Nachricht zum Chat
        function addMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', `message-${sender}`);

            const bubbleDiv = document.createElement('div');
            bubbleDiv.classList.add('message-bubble', `${sender}-bubble`);
            bubbleDiv.textContent = text;

            const senderDiv = document.createElement('div');
            senderDiv.classList.add('message-sender');
            senderDiv.textContent = sender === 'user' ? 'Du' : 'KI';

            messageDiv.appendChild(bubbleDiv);
            messageDiv.appendChild(senderDiv);
            chatMessages.appendChild(messageDiv);

            // Scroll zum letzten Nachricht
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Funktion zum Anzeigen der "Tippt“-Animation
        function showTypingIndicator() {
            typingIndicator.classList.add('active');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTypingIndicator() {
            typingIndicator.classList.remove('active');
        }

        // Funktion zum Senden einer Nachricht
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Benutzernachricht hinzufügen
            addMessage('user', message);
            userInput.value = '';

            // "Tippt“-Animation anzeigen
            showTypingIndicator();

            // Backend-Anfrage
            try {
                const response = await fetch(backendUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message }),
                });

                if (!response.ok) {
                    throw new Error(`Serverfehler: ${response.status}`);
                }

                const data = await response.json();
                hideTypingIndicator();

                // KI-Antwort hinzufügen
                addMessage('bot', data.reply);
            } catch (error) {
                hideTypingIndicator();
                addMessage('bot', `Fehler: ${error.message}. Bitte stelle sicher, dass das Backend läuft.`);
            }
        }

        // Event-Listener
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Fokus auf das Eingabefeld setzen
        userInput.focus();
    </script>
</body>
</html>
